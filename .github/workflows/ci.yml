name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build agent-service
        working-directory: agent-service
        run: |
          npm ci
          npm run build

      - name: Install and build TS SDK
        working-directory: sdk/typescript
        run: |
          npm ci
          npx tsc

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo check workspace
        run: cargo check --workspace

      - name: Cargo test executor
        run: cargo test -p executor --lib
