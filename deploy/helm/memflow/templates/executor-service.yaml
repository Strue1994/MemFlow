apiVersion: v1
kind: Service
metadata:
  name: {{ include "memflow.fullname" . }}-executor
  labels:
    {{- include "memflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: executor
spec:
  type: {{ .Values.executor.service.type }}
  ports:
    - port: {{ .Values.executor.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "memflow.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: executor
