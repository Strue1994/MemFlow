# MemFlow Helm Values
# Global settings applied to all components
global:
  imageRegistry: ""
  imagePullSecrets: []
  environment: production

# Executor service (Rust workflow engine)
executor:
  replicaCount: 2
  image:
    repository: memflow/executor
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8082
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1Gi
  env:
    RUST_LOG: info
    EXECUTOR_PORT: "8082"
  persistence:
    enabled: true
    size: 10Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

# Memory Hub (vector memory store)
memoryHub:
  replicaCount: 1
  image:
    repository: memflow/memory-hub
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8081
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  env:
    MEMORY_HUB_PORT: "8081"
    EMBEDDING_ENGINE: local
  persistence:
    enabled: true
    size: 5Gi

# Agent Service (TypeScript API + Agent Loop)
agentService:
  replicaCount: 2
  image:
    repository: memflow/agent-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3300
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  env:
    PORT: "3300"
    EXECUTOR_URL: "http://memflow-executor:8082"
    MEMORY_HUB_URL: "http://memflow-memory-hub:8081"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70

# Web UI (React frontend)
webUI:
  replicaCount: 2
  image:
    repository: memflow/web-ui
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5273
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  env:
    VITE_API_URL: "http://memflow-agent-service:3300"

# Learning Engine
learningEngine:
  replicaCount: 1
  image:
    repository: memflow/learning-engine
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8083
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  env:
    LEARNING_ENGINE_PORT: "8083"

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: memflow.example.com
      paths:
        - path: /
          pathType: Prefix
          service: web-ui
          port: 5273
  tls:
    - secretName: memflow-tls
      hosts:
        - memflow.example.com

# Global configuration
config:
  executorApiKey: ""  # Set via --set or external secret
  openaiApiKey: ""    # Set via --set or external secret

# Monitoring
monitoring:
  enabled: true
  prometheusRules:
    enabled: true
  grafana:
    enabled: true
    dashboards: true
