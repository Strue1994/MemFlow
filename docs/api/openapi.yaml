openapi: 3.0.0
info:
  title: MemFlow API
  version: 1.0.0
  description: MemFlow Workflow Automation API

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.memflow.io
    description: Production server

paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /workflows:
    get:
      summary: List all workflows
      security:
        - ApiKeyAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of workflows
          content:
            application/json:
              example:
                workflows:
                  - id: wf_123
                    name: My Workflow
                    nodes: []
                    version: 1

  /workflows:
    post:
      summary: Create workflow from JSON
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - json
              properties:
                name:
                  type: string
                json:
                  type: object
      responses:
        '201':
          description: Workflow created

  /execute:
    post:
      summary: Execute a workflow
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - workflow_id
              properties:
                workflow_id:
                  type: string
                params:
                  type: object
      responses:
        '200':
          description: Execution result

  /create_workflow:
    post:
      summary: Create workflow from natural language
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - description
              properties:
                description:
                  type: string
                context:
                  type: object
      responses:
        '200':
          description: Workflow created

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization